<!--
  AgentStack plugin badge — dark variant.

  Same canonical AgentStack mark as logo.svg / brand-mark.svg
  (source of truth: https://agentstack.tech/favicon.svg), only the
  palette differs:
    • Badge background: slate gradient (#0B1220 → #1E293B) so it reads
      well on light UI chrome.
    • Mark fill: sky→violet accent gradient so the mark still pops on
      the dark badge.

  See assets/ICON_DESIGN.md for rules. Do not reintroduce <line> or
  stroke-based geometry.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512" height="512"
     role="img"
     aria-label="AgentStack">
  <defs>
    <linearGradient id="agentstackBgDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="agentstackFgDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

